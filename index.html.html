<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scénario 1 : Étouffement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            background: transparent !important;
        }
        html, body, #root {
            background: transparent !important;
        }
        /* FORCER L'ÉCRITURE DE GAUCHE À DROITE */
        input[type="text"] { 
            direction: ltr !important; 
            text-align: left !important;
            unicode-bidi: embed !important;
            writing-mode: horizontal-tb !important;
        }
        input[type="text"]:focus {
            direction: ltr !important;
            text-align: left !important;
            unicode-bidi: embed !important;
        }
        input {
            direction: ltr !important;
            text-align: left !important;
        }
        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slide-in { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
        @keyframes pulse-timer { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fade-in 0.5s ease-out; }
        .animate-slide-in { animation: slide-in 0.5s ease-out; }
        .animate-slide-up { animation: slide-up 0.4s ease-out; }
        .timer-warning { animation: pulse-timer 1s infinite; }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        .genially-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 600px;
        }
    </style>
</head>
<body style="background: transparent;">
    <div id="root" style="background: transparent;"></div>

    <script>
        let etape=-1,score=0,feedback='',showFeedback=false,reponseSelectionnee=null,reponseValidee=false,nomJoueur='',nomTemporaire='',timerInterval=null,tempsRestant=30;

        function startTimer() {
            tempsRestant = 30;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                tempsRestant--;
                updateTimer();
                if (tempsRestant <= 0) {
                    clearInterval(timerInterval);
                    handleTimerExpired();
                }
            }, 1000);
        }

        function updateTimer() {
            const timerEl = document.getElementById('timer');
            if (timerEl) {
                timerEl.textContent = tempsRestant;
                if (tempsRestant <= 10) {
                    timerEl.classList.add('timer-warning');
                    timerEl.parentElement.classList.add('bg-red-500');
                    timerEl.parentElement.classList.remove('bg-blue-600');
                }
            }
        }

        function handleTimerExpired() {
            feedback = '⚠️ Temps écoulé ! Passez à la question suivante.';
            showFeedback = true;
            reponseValidee = true;
            render();
            setTimeout(() => {
                showFeedback = false;
                etape++;
                reponseSelectionnee = null;
                reponseValidee = false;
                render();
            }, 3000);
        }

        function afficherFeedback(e,t,a){
            clearInterval(timerInterval);
            feedback=e,showFeedback=!0,t&&(score+=a),render(),setTimeout(()=>{showFeedback=!1,etape++,reponseSelectionnee=null,reponseValidee=!1,render()},4e3)
        }
        
        function selectionnerReponse(e){reponseValidee||(reponseSelectionnee=e,render())}
        
        function validerReponse(e,t,a,n){
            if(null===reponseSelectionnee)return feedback='⚠️ Veuillez sélectionner une réponse avant de valider',showFeedback=!0,render(),void setTimeout(()=>{showFeedback=!1,render()},2e3);
            clearInterval(timerInterval);
            reponseValidee=!0,reponseSelectionnee===e?afficherFeedback(t,!0,n):afficherFeedback(a,!1,0)
        }
        
        function commencerJeu(){
            if(''===nomTemporaire.trim())return feedback='⚠️ Veuillez entrer votre nom pour commencer',showFeedback=!0,render(),void setTimeout(()=>{showFeedback=!1,render()},2e3);
            nomJoueur=nomTemporaire.trim(),etape=0,render()
        }
        
        function getBadge(e){
            return e>=130?{icon:'🥇',titre:'EXPERT',message:'Performance exceptionnelle !',color:'from-yellow-500 to-amber-600'}:e>=100?{icon:'🥈',titre:'COMPÉTENT',message:'Très bonne maîtrise !',color:'from-gray-400 to-gray-600'}:e>=70?{icon:'🥉',titre:'EN APPRENTISSAGE',message:'Continuez à vous entraîner',color:'from-orange-500 to-red-600'}:{icon:'📚',titre:'À REVOIR',message:'Révisez les protocoles',color:'from-blue-500 to-indigo-600'}
        }
        
        function getBoutonStyle(e,t){
            const a='w-full py-4 px-6 rounded-lg text-left transition-all duration-300 cursor-pointer ';
            if(!reponseValidee)return a+(reponseSelectionnee===e?'border-4 border-blue-500 bg-blue-50 transform scale-105 shadow-lg':'border-2 border-gray-300 bg-white hover:bg-gray-50 hover:shadow-md');
            return{2:'B',3:'C',4:'A',5:'B',6:'B',7:'A',8:'B'}[t]===e?a+'border-4 border-green-500 bg-green-50':a+'border-2 border-gray-300 bg-gray-100'
        }

        function renderTimer() {
            return `
                <div class="flex items-center justify-center mb-4">
                    <div class="bg-blue-600 text-white px-6 py-3 rounded-xl shadow-lg flex items-center space-x-3">
                        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                        </svg>
                        <span class="text-2xl font-bold" id="timer">${tempsRestant}</span>
                        <span class="text-sm">sec</span>
                    </div>
                </div>
            `;
        }

        function renderIcone(type) {
            const icones = {
                etouffement: '<svg class="w-24 h-24 mx-auto text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/><path d="M12 8c-.55 0-1 .45-1 1v3c0 .55.45 1 1 1s1-.45 1-1V9c0-.55-.45-1-1-1z" fill="red"/></svg>',
                alerte: '<svg class="w-20 h-20 mx-auto text-red-600 animate-shake" fill="currentColor" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>',
                question: '<svg class="w-16 h-16 mx-auto text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>',
                main: '<svg class="w-20 h-20 mx-auto text-orange-600" fill="currentColor" viewBox="0 0 24 24"><path d="M23 5.5V20c0 2.2-1.8 4-4 4h-7.3c-1.08 0-2.1-.43-2.85-1.19L1 14.83s1.26-1.23 1.3-1.25c.22-.19.49-.29.79-.29.22 0 .42.06.6.16.04.01 4.31 2.46 4.31 2.46V4c0-.83.67-1.5 1.5-1.5S11 3.17 11 4v7h1V1.5c0-.83.67-1.5 1.5-1.5S15 .67 15 1.5V11h1V2.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5V11h1V5.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5z"/></svg>',
                position: '<svg class="w-20 h-20 mx-auto text-purple-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm9 7h-6v13h-2v-6h-2v6H9V9H3V7h18v2z"/></svg>',
                heimlich: '<svg class="w-20 h-20 mx-auto text-red-600" fill="currentColor" viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>',
                check: '<svg class="w-20 h-20 mx-auto text-green-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
                phone: '<svg class="w-20 h-20 mx-auto text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>'
            };
            return icones[type] || '';
        }

        function renderQuestion(e,t,a,n,r,o,s,l,iconeType='question'){
            startTimer();
            return`<div class="space-y-6 animate-fade-in">${renderTimer()}<div class="bg-gradient-to-r ${l} text-white p-5 rounded-xl shadow-lg"><div class="flex items-center justify-center mb-3">${renderIcone(iconeType)}</div><p class="font-bold text-xl text-center">${e}</p><p class="text-sm mt-2 opacity-90 text-center">${t}</p></div><div class="space-y-3">${a.map(e=>`<button onclick="selectionnerReponse('${e.lettre}')" class="${getBoutonStyle(e.lettre,etape)}"><span class="font-bold text-lg">${e.lettre})</span> ${e.texte}</button>`).join('')}</div><div class="pt-4 border-t border-gray-200"><button onclick="validerReponse('${n}', \`${r}\`, \`${o}\`, ${s})" class="w-full py-4 rounded-xl font-bold text-lg transition-all ${reponseSelectionnee?'bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700':'bg-gray-400 cursor-not-allowed'} text-white shadow-lg flex items-center justify-center" ${reponseSelectionnee?'':'disabled'}><svg class="mr-3" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>VALIDER MA RÉPONSE</button></div></div>`
        }

        function renderEtape(){
            switch(etape){
                case-1:return`<div class="text-center space-y-6 animate-fade-in"><div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-6 px-6 rounded-2xl shadow-2xl"><div class="flex items-center justify-center mb-3"><svg class="mr-2" width="40" height="40" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg><h1 class="text-3xl font-bold">BIENVENUE</h1></div><p class="text-lg opacity-90">Formation aux Premiers Secours</p></div><div class="bg-white/95 backdrop-blur-sm p-6 rounded-2xl shadow-lg border-2 border-indigo-200"><div class="mb-5"><div class="w-24 h-24 mx-auto mb-3 bg-gradient-to-br from-red-100 to-pink-100 rounded-full flex items-center justify-center shadow-lg"><span class="text-5xl">👤</span></div><h2 class="text-xl font-bold text-gray-800 mb-2">Identifiez-vous</h2><p class="text-gray-600 text-sm">Votre nom apparaîtra sur votre certificat</p></div><div class="mb-5"><label class="block text-left font-semibold text-gray-700 mb-2 text-sm">Entrez votre nom complet :</label><input type="text" id="nomInput" value="${nomTemporaire}" placeholder="Ex: Ahmed Alami" lang="en" dir="ltr" inputmode="latin" class="w-full px-4 py-3 text-base border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none transition-all" maxlength="50" style="direction: ltr !important; text-align: left !important; unicode-bidi: embed !important; writing-mode: horizontal-tb !important;" onkeypress="if(event.key==='Enter') commencerJeu()" oninput="this.value=this.value;this.setSelectionRange(this.value.length,this.value.length)"/><p class="text-xs text-gray-500 mt-1 text-left">${nomTemporaire.length}/50 caractères</p></div><button onclick="commencerJeu()" class="w-full py-3 px-6 rounded-xl font-bold text-base transition-all shadow-lg flex items-center justify-center ${''===nomTemporaire.trim()?'bg-gray-400 cursor-not-allowed text-white':'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white transform hover:scale-105'}">COMMENCER<svg class="ml-2" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button></div><div class="bg-yellow-50/90 backdrop-blur-sm border-l-4 border-yellow-500 p-4 rounded-xl shadow-md"><p class="font-bold text-yellow-800 text-sm mb-1">📌 Information</p><p class="text-yellow-700 text-xs">Formation interactive - Durée : 10-15 minutes</p></div></div>`;
                
                case 0:return`<div class="text-center space-y-5 animate-fade-in"><div class="bg-gradient-to-r from-red-600 to-red-700 text-white py-5 px-6 rounded-2xl shadow-2xl"><h1 class="text-3xl font-bold mb-2">🚨 URGENCES</h1><p class="text-xl font-semibold">Scénario 1 : ÉTOUFFEMENT</p></div><div class="bg-white/95 backdrop-blur-sm p-6 rounded-2xl shadow-lg border-2 border-red-200"><div class="bg-indigo-100 border-l-4 border-indigo-500 p-3 rounded-lg mb-4"><p class="font-bold text-indigo-800 text-sm">Apprenant : ${nomJoueur}</p></div><p class="text-xl mb-4 font-bold text-gray-800">Niveau : <span class="text-green-600">FACILE</span></p><p class="text-base text-gray-700 mb-4">8 questions - 30 secondes par question</p><div class="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-lg"><p class="font-semibold text-blue-800 text-sm">⏱️ Soyez rapide et précis !</p></div></div><button onclick="etape=1;render();" class="bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-700 hover:to-orange-700 text-white font-bold py-3 px-8 rounded-2xl transition-all transform hover:scale-105 shadow-xl text-lg">COMMENCER</button></div>`;
                
                case 1:return`<div class="space-y-5 animate-slide-in"><div class="bg-white/95 backdrop-blur-sm p-6 rounded-2xl shadow-xl border-4 border-red-400"><div class="flex items-center justify-center mb-4"><div class="w-32 h-32 bg-gradient-to-br from-red-200 to-pink-200 rounded-full flex items-center justify-center shadow-inner animate-pulse"><span class="text-7xl">😰</span></div></div><div class="text-center mb-4"><p class="text-xl font-bold text-red-600 mb-3">⚠️ RESTAURANT</p><div class="bg-gray-100 p-3 rounded-xl mb-3"><p class="text-lg font-bold text-gray-800 mb-1">Personne porte les mains à sa gorge !</p><p class="text-gray-600 italic text-sm">Ne peut plus parler, visage rouge...</p></div>${renderIcone('alerte')}</div></div><button onclick="etape=2;render();" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-bold py-3 px-5 rounded-xl transition-all shadow-lg text-base">OBSERVER LA SITUATION</button></div>`;
                
                case 2:return renderQuestion('QUE SE PASSE-T-IL ?','Analysez la situation',[{lettre:'A',texte:'Tousse légèrement'},{lettre:'B',texte:'Obstruction totale'},{lettre:'C',texte:'Crise cardiaque'},{lettre:'D',texte:'Fait semblant'}],'B','✓ CORRECT ! Signes d\'obstruction totale identifiés.','⚠ Les signes indiquent une obstruction TOTALE.',20,'from-yellow-400 to-orange-500','etouffement');
                
                case 3:return renderQuestion('PREMIÈRE ACTION ?','Sélectionnez puis validez',[{lettre:'A',texte:'Donner à boire'},{lettre:'B',texte:'Taper dans le dos'},{lettre:'C',texte:'Demander "Vous étouffez-vous ?"'},{lettre:'D',texte:'Appeler secours'}],'C','✓ PARFAIT ! Toujours ÉVALUER d\'abord.','⚠ Il faut d\'abord ÉVALUER la gravité.',15,'from-blue-500 to-cyan-600','question');
                
                case 4:return renderQuestion('⚠️ Victime ne peut pas répondre !','ACTION IMMÉDIATE ?',[{lettre:'A',texte:'5 claques dorsales'},{lettre:'B',texte:'Mettre allongée'},{lettre:'C',texte:'Compressions abdominales'},{lettre:'D',texte:'Attendre'}],'A','✓ EXCELLENT ! 5 claques dorsales d\'abord.','⚠ Protocole : d\'abord 5 CLAQUES DORSALES.',20,'from-orange-500 to-red-600','main');
                
                case 5:return renderQuestion('POSITION DE LA VICTIME ?','Pour les claques dorsales',[{lettre:'A',texte:'Allongée sur le dos'},{lettre:'B',texte:'Penchée en avant'},{lettre:'C',texte:'Debout droite'},{lettre:'D',texte:'Assise'}],'B','✓ PARFAIT ! Victime penchée en avant.','⚠ La victime doit être PENCHÉE EN AVANT.',15,'from-purple-500 to-pink-600','position');
                
                case 6:return`<div class="space-y-6 animate-fade-in"><div class="bg-white/95 backdrop-blur-sm p-5 rounded-2xl shadow-xl"><div class="flex items-center justify-center mb-4"><div class="text-8xl animate-bounce">👊</div></div><div class="bg-gradient-to-r from-orange-100 to-amber-100 p-4 rounded-xl mb-4"><p class="text-xl font-bold text-gray-800 mb-1">5 CLAQUES DORSALES</p><p class="text-gray-600 text-sm">Entre les omoplates</p></div><div class="flex justify-center space-x-2">${[1,2,3,4,5].map(e=>`<div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-red-500 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg animate-pulse">${e}</div>`).join('')}</div></div><button onclick="etape=7;render();" class="w-full bg-gradient-to-r from-orange-600 to-red-600 text-white font-bold py-3 px-5 rounded-xl text-base">CONTINUER</button></div>`;
                
                case 7:return renderQuestion('⚠️ Claques inefficaces !','QUE FAIRE ?',[{lettre:'A',texte:'Recommencer claques'},{lettre:'B',texte:'Compressions (Heimlich)'},{lettre:'C',texte:'Appeler et attendre'},{lettre:'D',texte:'Coups sur ventre'}],'B','✓ PARFAIT ! Heimlich. Objet expulsé !','⚠ Il faut les COMPRESSIONS ABDOMINALES.',25,'from-red-600 to-rose-700','heimlich');
                
                case 8:return renderQuestion('SIGNE D\'EFFICACITÉ ?','Comment savoir que ça a marché ?',[{lettre:'A',texte:'Victime inconsciente'},{lettre:'B',texte:'Expulsion + respiration normale'},{lettre:'C',texte:'Tousse fort'},{lettre:'D',texte:'Visage bleu'}],'B','✓ CORRECT ! Expulsion + respiration = succès.','⚠ EXPULSION de l\'objet + RESPIRATION.',15,'from-teal-500 to-cyan-600','check');
                
                case 9:return`<div class="space-y-6 animate-fade-in"><div class="bg-gradient-to-r from-green-500 to-emerald-600 p-6 rounded-2xl text-center border-4 border-white/30 shadow-xl"><div class="text-8xl mb-4 animate-bounce">🎉</div><p class="text-2xl font-bold text-white mb-2">OBJET EXPULSÉ !</p><div class="bg-white/20 p-4 rounded-xl"><p class="text-lg text-white">Victime sauvée ✓</p></div></div><button onclick="etape=10;render();" class="w-full bg-gradient-to-r from-green-600 to-emerald-700 text-white font-bold py-3 px-5 rounded-xl text-base">DERNIÈRE ÉTAPE</button></div>`;
                
                case 10:return renderQuestion('📞 APPEL SECOURS','Numéro au Maroc ?',[{lettre:'A',texte:'177 (Pompiers)'},{lettre:'B',texte:'150 (SAMU Maroc)'},{lettre:'C',texte:'141 (Police)'},{lettre:'D',texte:'190 (Ambulance)'}],'B','✓ PARFAIT ! 150 = SAMU Maroc.','⚠ Étouffement au Maroc : 150 (SAMU).',20,'from-blue-600 to-indigo-700','phone');
                
                case 11:const e=getBadge(score);return`<div class="space-y-5 animate-fade-in"><div class="bg-gradient-to-br from-purple-600 via-blue-600 to-cyan-600 text-white p-6 rounded-2xl text-center shadow-2xl"><svg class="mx-auto mb-4" width="64" height="64" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg><h2 class="text-3xl font-bold mb-2">CERTIFICAT</h2><div class="bg-white/20 p-5 rounded-xl mb-4"><p class="text-xs opacity-80 mb-1">Attribué à</p><div class="bg-white/30 py-3 px-4 rounded-xl mb-3"><p class="text-2xl font-bold">${nomJoueur}</p></div></div><div class="bg-white/20 p-5 rounded-xl mb-4"><p class="text-5xl font-bold mb-3">${score}/150</p><div class="w-full bg-white/30 h-3 rounded-full mt-3"><div class="bg-gradient-to-r from-green-400 to-emerald-500 h-full rounded-full" style="width:${score/150*100}%"></div></div><p class="text-base mt-2">${(score/150*100).toFixed(0)}% réussite</p></div><div class="bg-gradient-to-r ${e.color} p-5 rounded-xl"><p class="text-6xl mb-3">${e.icon}</p><p class="text-2xl font-bold mb-1">${e.titre}</p><p class="text-base">${e.message}</p></div></div><div class="bg-white/95 backdrop-blur-sm p-5 rounded-xl shadow-lg"><h3 class="font-bold text-lg mb-4">📋 PROTOCOLE</h3>${[{s:'1. Reconnaître',d:'Mains à la gorge'},{s:'2. Évaluer',d:'Demander "Vous étouffez-vous ?"'},{s:'3. Positionner',d:'Victime penchée'},{s:'4. Agir',d:'5 claques dorsales'},{s:'5. Si échec',d:'Compressions (Heimlich)'},{s:'6. Vérifier',d:'Expulsion + respiration'},{s:'7. Alerter',d:'150 (SAMU)'}].map((e,t)=>`<div class="flex items-start bg-gray-50 p-3 rounded-xl mb-2"><div class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white w-7 h-7 rounded-full flex items-center justify-center font-bold mr-3 flex-shrink-0 text-sm">${t+1}</div><div><p class="font-bold text-sm">${e.s}</p><p class="text-gray-600 text-xs">${e.d}</p></div></div>`).join('')}</div><div class="flex gap-3"><button onclick="recommencer()" class="flex-1 bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-bold py-3 px-4 rounded-xl text-sm">🔄 RECOMMENCER</button><button onclick="alert('Scénario 2 : Brûlure (à venir)')" class="flex-1 bg-gradient-to-r from-green-600 to-emerald-600 text-white font-bold py-3 px-4 rounded-xl text-sm">SCÉNARIO 2 →</button></div></div>`;
                
                default:return'<div class="text-center p-8"><p class="text-gray-700">Chargement...</p></div>'
            }
        }

        function recommencer(){
            clearInterval(timerInterval);
            etape=1;
            score=0;
            reponseSelectionnee=null;
            reponseValidee=!1;
            tempsRestant=30;
            render()
        }

        function render(){
            const root=document.getElementById('root');
            const progressBar=etape>=0&&etape<11?`<div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-xl p-4 mb-4 border-2 border-gray-200"><div class="flex justify-between items-center mb-3"><div class="flex items-center"><div class="bg-gradient-to-r from-red-500 to-pink-500 p-2 rounded-xl mr-2"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div><div><span class="font-bold text-xl text-gray-800">${score}</span><span class="text-gray-600 ml-1 text-sm">pts</span></div></div><div class="text-right"><div class="text-xs text-gray-600 mb-1">Progression</div><div class="text-base font-bold text-gray-800">Q ${etape>1?etape-1:0}/8</div></div></div><div class="w-full bg-gray-200/70 rounded-full h-2"><div class="bg-gradient-to-r from-red-500 to-orange-500 h-2 rounded-full transition-all duration-700" style="width:${etape>0?(etape-1)/10*100:0}%"></div></div></div>`:'';
            const feedbackHTML=showFeedback?`<div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 max-w-xl w-full ${feedback.includes('✓')?'bg-gradient-to-r from-green-100 to-emerald-100 border-green-400':'bg-gradient-to-r from-orange-100 to-amber-100 border-orange-400'} border-2 p-4 rounded-xl shadow-2xl animate-slide-up z-50"><div class="flex items-start">${feedback.includes('✓')?'<div class="bg-gradient-to-r from-green-500 to-emerald-500 p-2 rounded-full mr-3"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>':'<div class="bg-gradient-to-r from-orange-500 to-amber-500 p-2 rounded-full mr-3"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>'}<div><p class="font-bold text-base mb-1">${feedback.includes('✓')?'BONNE RÉPONSE !':'À CORRIGER'}</p><p class="text-gray-700 text-sm">${feedback.replace(/^[✓⚠]\s*/,'')}</p></div></div></div>`:'';
            
            root.innerHTML=`<div class="genially-container" style="background: transparent;">${progressBar}<div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-6 border-2 border-gray-200">${renderEtape()}</div>${feedbackHTML}</div>`;
            
            if(etape===-1){
                const input=document.getElementById('nomInput');
                if(input){
                    input.value=nomTemporaire;
                    input.setAttribute('dir','ltr');
                    input.setAttribute('lang','en');
                    input.setAttribute('inputmode','latin');
                    input.style.direction='ltr';
                    input.style.textAlign='left';
                    input.style.unicodeBidi='embed';
                    input.style.writingMode='horizontal-tb';
                    input.addEventListener('input',e=>{
                        nomTemporaire=e.target.value;
                        setTimeout(()=>{
                            const len=e.target.value.length;
                            e.target.setSelectionRange(len,len);
                        },0);
                        render();
                    });
                    input.focus();
                    setTimeout(()=>{
                        const len=input.value.length;
                        input.setSelectionRange(len,len);
                    },10);
                }
            }
        }
        
        render();
    </script>
</body>
</html>
